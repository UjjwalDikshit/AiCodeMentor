# CodeMentor AI
#
# Multi-service stack:
#   frontend   → React (Vite) on :5173
#   backend    → Express API + Socket.IO on :5000
#   ai-service → FastAPI / LangChain on :8000
#   mongo      → MongoDB on :27017

services:
  mongo:
    image: mongo:7
    container_name: codementor-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-codementor_ai}
    networks:
      - codementor-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codementor-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongo:27017/${MONGO_INITDB_DATABASE:-codementor_ai}
      AI_SERVICE_URL: http://ai-service:8000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend_uploads:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
      ai-service:
        condition: service_started
    networks:
      - codementor-net

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: codementor-ai-service
    restart: unless-stopped
    ports:
      - "${AI_SERVICE_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      AI_SERVICE_HOST: 0.0.0.0
      AI_SERVICE_PORT: 8000
      AI_PROVIDER: ${AI_PROVIDER:-dummy}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-dummy}
      CHROMA_DIRECTORY: /app/data/chroma
      CHROMA_PERSIST_DIR: /app/data/chroma
      PROMPTS_DIRECTORY: /app/app/prompts/registry
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    volumes:
      - ./ai-service:/app
      - ai_chroma_data:/app/data/chroma
    networks:
      - codementor-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codementor-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api/v1
      VITE_SOCKET_URL: http://localhost:5000
      VITE_AI_SERVICE_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - codementor-net

volumes:
  mongo_data:
  backend_uploads:
  ai_chroma_data:

networks:
  codementor-net:
    driver: bridge
