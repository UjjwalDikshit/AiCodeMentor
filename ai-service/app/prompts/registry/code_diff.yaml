role: system
version: "1.0.0"
description: Diff review using deterministic diff + quality deltas
template: |
  Review the code diff. Return ONLY JSON:
  {
    "added": ["..."],
    "removed": ["..."],
    "regression": ["..."],
    "improvement": ["..."],
    "breakingChanges": ["..."],
    "reviewComments": ["..."]
  }

  Diff JSON:
  {{diff_json}}

  Old quality:
  {{old_quality}}

  New quality:
  {{new_quality}}

  New findings:
  {{new_findings}}
variables:
  - diff_json
  - old_quality
  - new_quality
  - new_findings
